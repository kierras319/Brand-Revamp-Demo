<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <!-- Background -->
  <rect width="1080" height="1920" fill="#8B4A6B"/>

  <!-- Subtle texture overlay -->
  <rect width="1080" height="1920" fill="url(#noise)" opacity="0.04"/>

  <!-- Top + bottom thin gold rules -->
  <rect x="140" y="180" width="800" height="2" fill="#D4C9B8" opacity="0.4"/>
  <rect x="140" y="1738" width="800" height="2" fill="#D4C9B8" opacity="0.4"/>

  <!-- Circle safe zone guide (invisible — just centering reference) -->
  <!-- Center: 540, 960 | Radius: 200 -->

  <!-- Open book icon — centered at 540, 920 -->
  <g transform="translate(420, 800)" stroke="#F5F0E8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left page -->
    <path d="M120 40 C80 40 20 55 20 55 L20 215 C20 215 80 200 120 200 L120 40Z"/>
    <!-- Right page -->
    <path d="M120 40 C160 40 220 55 220 55 L220 215 C220 215 160 200 120 200 L120 40Z"/>
    <!-- Spine -->
    <line x1="120" y1="40" x2="120" y2="200"/>
    <!-- Left lines -->
    <line x1="50" y1="100" x2="110" y2="93"/>
    <line x1="50" y1="125" x2="110" y2="118"/>
    <line x1="50" y1="150" x2="110" y2="145"/>
    <!-- Right lines -->
    <line x1="190" y1="100" x2="130" y2="93"/>
    <line x1="190" y1="125" x2="130" y2="118"/>
    <line x1="190" y1="150" x2="130" y2="145"/>
  </g>

  <!-- Label -->
  <text x="540" y="1082" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#F5F0E8" text-anchor="middle" letter-spacing="4">FREE</text>
  <text x="540" y="1158" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="700" fill="#F5F0E8" text-anchor="middle" letter-spacing="4">STORY</text>

  <!-- Small brand mark -->
  <text x="540" y="1860" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#F5F0E8" opacity="0.5" text-anchor="middle" letter-spacing="6">KEKE SHARICE</text>
</svg>
